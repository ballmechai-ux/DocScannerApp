name: Build Android APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: npm install
      - name: Create Keystore
        run: keytool -genkey -v -keystore keystore.jks -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=DocScanner,OU=App,O=App,L=Bangkok,S=Bangkok,C=TH" -storepass android -keypass android
      - name: Create credentials.json
        run: echo '{"android":{"keystore":{"keystorePath":"keystore.jks","keystorePassword":"android","keyAlias":"key0","keyPassword":"android"}}}' > credentials.json
      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: 1
